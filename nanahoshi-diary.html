// 食事画像はIndexedDBに保存（容量問題対策）
const IMG_DB_NAME = "nanahoshi_meal_images";
const IMG_DB_VER = 1;
let imgDb = null;
function openImgDb() {
  return new Promise((res,rej) => {
    if (imgDb) return res(imgDb);
    const req = indexedDB.open(IMG_DB_NAME, IMG_DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore("images");
    req.onsuccess = e => { imgDb = e.target.result; res(imgDb); };
    req.onerror = e => rej(e);
  });
}
async function saveImg(key, dataUrl) {
  const db = await openImgDb();
  return new Promise((res,rej) => {
    const tx = db.transaction("images","readwrite");
    tx.objectStore("images").put(dataUrl, key);
    tx.oncomplete = () => res();
    tx.onerror = e => rej(e);
  });
}
async function loadImg(key) {
  const db = await openImgDb();
  return new Promise((res,rej) => {
    const tx = db.transaction("images","readonly");
    const req = tx.objectStore("images").get(key);
    req.onsuccess = () => res(req.result||null);
    req.onerror = e => rej(e);
  });
}
async function deleteImg(key) {
  const db = await openImgDb();
  return new Promise((res,rej) => {
    const tx = db.transaction("images","readwrite");
    tx.objectStore("images").delete(key);
    tx.oncomplete = () => res();
    tx.onerror = e => rej(e);
  });
}
// 画像を圧縮してDataURLに変換
function compressImage(file, maxW=800, quality=0.7) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleMealImgPaste(event, date, slotId) {
  const items = event.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith("image/")) {
      event.preventDefault();
      const file = item.getAsFile();
      await saveMealImgFromFile(file, date, slotId);
      break;

  }
}

const GOOD_CHECK_IDS = ["sleep_ok","meal","alone"];
const TOUGH_CHECK_IDS = ["sleep_lack","sleep_nap","sleep_rhythm","child","work","task"];

function gardenStats(entries) {
  const totalDays = entries.length;
  const recent = entries.slice(0,7); // 最新7件（直近の記録）
  const avgEnergy = recent.length
    ? recent.reduce((sum,e)=>sum+e.energy,0) / recent.length
    : 2;
  let goodCount = 0, toughCount = 0;
  recent.forEach(e => {
    const hasGood = GOOD_CHECK_IDS.some(id => e.checks?.[id]);
    const hasTough = TOUGH_CHECK_IDS.some(id => e.checks?.[id]);
    if (hasGood) goodCount++;
    if (hasTough) toughCount++;
  });
  // 育成段階: 記録日数で決まる（責めない・減らない指標）
  const stages = [
    { min:0,  emoji:"🌱", label:"芽が出たばかり" },
    { min:3,  emoji:"🌿", label:"双葉" },
    { min:7,  emoji:"🪴", label:"若木" },
    { min:14, emoji:"🌳", label:"育ってきた木" },
    { min:30, emoji:"🌳", label:"立派な木" },
  ];
  let stageIdx = 0;
  stages.forEach((s,i) => { if (totalDays >= s.min) stageIdx = i; });
  const stage = stages[stageIdx];
  const nextStage = stages[stageIdx+1];
  const progress = nextStage
    ? Math.min(100, Math.round(((totalDays - stage.min) / (nextStage.min - stage.min)) * 100))
    : 100;

  // 雰囲気: 直近のエネルギー平均で決定
  let mood;
  if (avgEnergy <= 0.8) mood = { label:"少ししおれてるね…無理しないでね", sky:["#9b9b9b","#bcb0a8"], plantEmoji:"🥀" };
  else if (avgEnergy <= 1.8) mood = { label:"ちょっとお疲れ気味", sky:["#a9a99a","#c8b89c"], plantEmoji: stage.emoji };
  else if (avgEnergy <= 2.8) mood = { label:"おだやかな日々", sky:["#9fc9d3","#c9e3c4"], plantEmoji: stage.emoji };
  else if (avgEnergy <= 3.8) mood = { label:"気持ちいい風が吹いてるよ", sky:["#7ec8e3","#bfe6b0"], plantEmoji: stage.emoji };
  else mood = { label:"庭が輝いてる✨", sky:["#6fc3e0","#ffe28a"], plantEmoji: stage.emoji };

  // 装飾: グッドチェックが多いほど増える
  let decor = [];
  if (goodCount >= 1) decor.push("🦋");
  if (goodCount >= 3) decor.push("🌸");
  if (goodCount >= 5) decor.push("🐝");
  if (goodCount >= 7) decor.push("🌈");

  return { totalDays, avgEnergy, goodCount, toughCount, stage, nextStage, progress, mood, decor };
}

};
function textHasAny(text, words) {
  if (!text) return false;
  return words.some(w => text.includes(w));
}
function dayFoodFlags(mealsOfDay) {
  if (!mealsOfDay) return {};
  const all = Object.values(mealsOfDay).join(" ");
  const ateBreakfast = !!(mealsOfDay.breakfast && mealsOfDay.breakfast.trim());
  const hadSnack = !!(mealsOfDay.snack && mealsOfDay.snack.trim());
  return {
    all,
    ateBreakfast,
    hadSnack,
    isJunk: textHasAny(all, FOOD_KEYWORDS.junk),
    isHealthy: textHasAny(all, FOOD_KEYWORDS.healthy),
    isBreadOnly: textHasAny(mealsOfDay.breakfast||"", FOOD_KEYWORDS.bread) && Object.keys(mealsOfDay).filter(k=>mealsOfDay[k]&&mealsOfDay[k].trim()).length<=1,
    isWarm: textHasAny(all, FOOD_KEYWORDS.warm),
    isConvenience: textHasAny(all, FOOD_KEYWORDS.convenience),
    isSweet: textHasAny(all, FOOD_KEYWORDS.sweet),
    isSimple: textHasAny(all, FOOD_KEYWORDS.simple),
  };
}

      if (textHasAny(byDate[d].memo||"", memoKeywords.relax)) {
        relaxWithNext++;
        if (byDate[next].energy > byDate[d].energy) recoveredNext++;
      }
    }
    if (relaxWithNext >= 1 && recoveredNext >= 1) {
      findings.push({
        body: `お風呂や散歩など、休息を取った翌日はエネルギーが上がることがありました。`,
        insight: "休むことがエネルギー回復につながっているのかもしれません。意識的に休める時間を作ることが、次の日の元気につながりそうです。"
      });
    }
  }

  // 達成感のある日×翌日のエネルギー
  const achieveDays = dates.filter(d => textHasAny(byDate[d].memo||"", memoKeywords.achievement));
  if (achieveDays.length >= 1) {
    let achieveHighNext=0, achieveWithNext=0;
    for (let i=0;i<dates.length-1;i++) {
      const d=dates[i], next=dates[i+1];
      const base=new Date(d+"T00:00:00+09:00"); base.setDate(base.getDate()+1);
      if (base.toLocaleDateString("sv-SE",{timeZone:"Asia/Tokyo"})!==next) continue;
      if (textHasAny(byDate[d].memo||"", memoKeywords.achievement)) {
        achieveWithNext++;
        if (byDate[next].energy >= 3) achieveHighNext++;
      }
    }
    if (achieveWithNext >= 1 && achieveHighNext >= 1) {
      findings.push({
        body: `「できた」「達成」と書いた翌日は、エネルギーが高めなことがありました。`,
        insight: "小さな達成感が、次の日のエネルギーを作っているのかもしれません。"
      });
    }
  }

  // メモに疲れワードが多い日×食事の傾向
  const tiredMemoDays = dates.filter(d => textHasAny(byDate[d].memo||"", memoKeywords.tired));
  if (tiredMemoDays.length >= 1) {
    const tiredMealSimple = tiredMemoDays.filter(d => meals[d] && dayFoodFlags(meals[d]).isSimple).length;
    if (tiredMealSimple >= 1) {
      findings.push({
        body: `「疲れた」と書いた日は、簡単な食事で済ませていることが多いようです。`,
        insight: "疲れているとき、調理のエネルギーまで残っていないことはよくあること。自分を責めなくていいよ。"
      });
    }
  }

  // メモに嬉しい・楽しいワードがある日
  const happyMemoDays = dates.filter(d => textHasAny(byDate[d].memo||"", memoKeywords.happy));
  if (happyMemoDays.length >= 1) {
    findings.push({
      body: `日記に「嬉しい」「楽しい」という言葉が${happyMemoDays.length}日分ありました。`,
      insight: "ポジティブな気持ちを言葉にできていること、それ自体が心の余裕の証かもしれません。"
    });
  }

  // メモにストレスワードがある日
  const stressMemoDays = dates.filter(d => textHasAny(byDate[d].memo||"", memoKeywords.stress));
  if (stressMemoDays.length >= 2) {
    const stressSweet = stressMemoDays.filter(d => meals[d] && dayFoodFlags(meals[d]).isSweet).length;
    if (stressSweet >= 1) {
      findings.push({
        body: `ストレスを感じた日は、甘いものに手が伸びることがあるようです。`,
        insight: "甘いものは一時的に気分を上げてくれます。身体が「ほっとしたい」と求めているサインかもしれません。"
      });
    } else {
      findings.push({
        body: `しんどいと感じた日が${stressMemoDays.length}日ありました。`,
        insight: "その気持ちをちゃんと言葉にできていること、すごいことだと思うよ。"
      });
    }
  }

  // メモにリラックスワードがある日×エネルギー
  const relaxMemoDays = dates.filter(d => textHasAny(byDate[d].memo||"", memoKeywords.relax));
  if (relaxMemoDays.length >= 1) {
    const avgRelaxEnergy = relaxMemoDays.reduce((s,d)=>s+byDate[d].energy,0)/relaxMemoDays.length;
    if (avgRelaxEnergy >= 2.5) {
      findings.push({
        body: `「ゆっくりできた」「ほっとした」という日は、エネルギーも高めな傾向がありました。`,
        insight: "休む時間がエネルギーを回復させているのかもしれません。意識的に余白を作ることの大切さが見えてきますね。"
      });
    }
  }
  const foodCount = (words) => words.filter(w => allFoodText.includes(w)).length;

  // お寿司・魚介系
  const sushiWords = ["寿司","すし","サーモン","まぐろ","マグロ","いくら","えび","エビ","刺身","海鮮","軍艦","にぎり","巻き","あなご"];
  const sushiHit = foodCount(sushiWords);
  if (sushiHit >= 1) {
    findings.push({
      body: `${periodLabel}、お寿司や魚介類を食べることがあったようです。`,
      insight: "魚介にはDHAやEPAが含まれており、脳や気分にも良い影響があると言われています。おいしく食べながら、身体にも優しい選択ができていたのかもしれません。"
    });
  }

  // 納豆・発酵食品
  const fermentedWords = ["納豆","味噌","みそ","ヨーグルト","キムチ","漬物","ぬか"];
  const fermentedDays = dates.filter(d => textHasAny(Object.values(meals[d]||{}).join(" "), fermentedWords)).length;
  if (fermentedDays >= 1) {
    findings.push({
      body: `記録のある日の中で、納豆や味噌汁など発酵食品を食べた日が${fermentedDays}日ありました。`,
      insight: "発酵食品は腸内環境を整え、気分や睡眠の質にも関わると言われています。意識せずに選んでいたとしたら、身体が欲していたのかもしれません。"
    });
  }

  // 麺類
  const noodleWords = ["ラーメン","うどん","そば","パスタ","そうめん","焼きそば","つけ麺","麺"];
  const noodleDays = dates.filter(d => textHasAny(Object.values(meals[d]||{}).join(" "), noodleWords)).length;
  if (noodleDays >= 1) {
    findings.push({
      body: `麺類を食べた日が${noodleDays}日ありました。`,
      insight: "麺類はさっと食べられる手軽さがあります。忙しい日や疲れた日に選んでいたなら、身体のペースに合わせた選択だったのかもしれません。"
    });
  }

  // 野菜・サラダ
  const vegWords = ["サラダ","野菜","きゅうり","トマト","ほうれん草","ブロッコリー","キャベツ","レタス","にんじん","玉ねぎ"];
  const vegDays = dates.filter(d => textHasAny(Object.values(meals[d]||{}).join(" "), vegWords)).length;
  if (vegDays >= 1) {
    findings.push({
      body: `野菜やサラダが食事に入っていた日が${vegDays}日ありました。`,
      insight: "野菜からとれるビタミンやミネラルは、疲れた身体の回復を助けてくれます。自然と選んでいたなら、身体の声を聞けていたのかもしれません。"
    });
  }

  // 甘いもの
  const sweetDays = dates.filter(d => textHasAny(Object.values(meals[d]||{}).join(" "), FOOD_KEYWORDS.sweet)).length;
  if (sweetDays >= 1) {
    findings.push({
      body: `甘いものを食べた日が${sweetDays}日ありました。`,
      insight: "甘いものが欲しくなるとき、身体がエネルギーや「ほっとする時間」を求めていることが多いようです。自分への小さなご褒美として、大切にしてあげてね。"
    });
  }

  // 朝食習慣
  const mealDates = dates.filter(d => meals[d]);
  const bfDays = mealDates.filter(d => meals[d].breakfast && meals[d].breakfast.trim()).length;
  if (mealDates.length >= 2) {
    if (bfDays === 0) {
      findings.push({
        body: "記録のある日の中で、朝食の記録がほとんどありませんでした。",
        insight: "朝食を食べない日が続くと、午前中のエネルギーが不安定になりやすいと言われています。でも忙しい日々の中では仕方ないことも。焦らなくていいよ。"
      });
    } else if (bfDays >= mealDates.length * 0.6) {
      findings.push({
        body: `食事を記録した日のうち、${bfDays}日は朝食も記録していました。`,
        insight: "朝食を食べた日はエネルギーのスタートラインが安定しやすいと言われています。朝のひと口が、その日一日のリズムを整えるスイッチになっているのかもしれません。"
      });
    }
  }

  // 間食習慣
  const snackDays = mealDates.filter(d => meals[d].snack && meals[d].snack.trim()).length;
  if (snackDays >= 2) {
    findings.push({
      body: `記録のある日のうち${snackDays}日、間食をしていました。`,
      insight: "間食は悪いことではなく、食事と食事の間の血糖値を安定させる効果もあります。何を食べているかより、食べていることに気づいていることの方が大切かもしれません。"
    });
  }

  // ===== パターン系: 閾値を緩めて1〜2件でも検出 =====

  // 睡眠不足×間食
  {
    let hit=0, total=0;
    dates.forEach(d => {
      const day = byDate[d]; if (!meals[d]) return;
      const isSleepLack = !!day.checks.sleep_lack || !!day.checks.sleep_nap || !!day.checks.sleep_rhythm;
      if (isSleepLack) { total++; if (meals[d].snack && meals[d].snack.trim()) hit++; }
    });
    if (total >= 1 && hit >= 1) {
      findings.push({
        body: "睡眠が十分でなかった日は、間食が増える傾向がありました。",
        insight: "疲れを感じたとき、身体が手っ取り早いエネルギー源を求めていたのかもしれません。"
      });
    }
  }

  // 元気な日×朝食
  {
    let hit=0, total=0;
    dates.forEach(d => {
      const day = byDate[d]; if (!meals[d]) return;
      if (day.energy >= 3) { total++; if (meals[d].breakfast && meals[d].breakfast.trim()) hit++; }
    });
    if (total >= 1 && hit >= 1) {
      findings.push({
        body: "元気いっぱいな日は、朝食をしっかり食べていることが多いようです。",
        insight: "朝のひと口が、その日のエンジンになっているのかもしれません。"
      });
    }
  }

  // 疲れた日×温かい食事
  {
    let hit=0, total=0;
    dates.forEach(d => {
      const day = byDate[d]; if (!meals[d]) return;
      const tired = day.energy <= 1 || day.checks.work || day.checks.child;
      if (tired) { total++; if (textHasAny(Object.values(meals[d]).join(" "), FOOD_KEYWORDS.warm)) hit++; }
    });
    if (total >= 1 && hit >= 1) {
      findings.push({
        body: "心や身体が疲れている日は、温かい食事を選ぶ傾向があるようです。",
        insight: "温もりのある食事が、ほっとひと息つく時間になっているのかもしれません。"
      });
    }
  }

  // 一人時間×食事が整う
  {
    let hit=0, total=0;
    dates.forEach(d => {
      const day = byDate[d]; if (!meals[d]) return;
      if (day.checks.alone) { total++; if (textHasAny(Object.values(meals[d]).join(" "), FOOD_KEYWORDS.healthy)) hit++; }
    });
    if (total >= 1 && hit >= 1) {
      findings.push({
        body: "一人の時間があった日は、食事内容も整いやすいようです。",
        insight: "あなたにとって、一人時間は心と食事の両方を整える大切な時間なのかもしれません。"
      });
    }
  }

  // ジャンクフードの翌日に健康的
  {
    let hit=0, total=0;
    for (let i=0; i<dates.length-1; i++) {
      const d=dates[i], next=dates[i+1];
      const base = new Date(d+"T00:00:00+09:00"); base.setDate(base.getDate()+1);
      if (base.toLocaleDateString("sv-SE",{timeZone:"Asia/Tokyo"}) !== next) continue;
      if (!meals[d]||!meals[next]) continue;
      const f1 = dayFoodFlags(meals[d]), f2 = dayFoodFlags(meals[next]);
      if (f1.isJunk) { total++; if (f2.isHealthy) hit++; }
    }
    if (total >= 1 && hit >= 1) {
      findings.push({
        body: "ジャンクフードが続いた翌日は、納豆や味噌汁など身体に優しい食事を選ぶことが多いようです。",
        insight: "身体が自然とバランスを取ろうとしているのかもしれません。"
      });
    }
  }

  // 仕事きつい日×簡単な食事
  {
    let hit=0, total=0;
    dates.forEach(d => {
      const day = byDate[d]; if (!meals[d]) return;
      if (day.checks.work) { total++; const f=dayFoodFlags(meals[d]); if (f.isSimple||f.isConvenience) hit++; }
    });
    if (total >= 1 && hit >= 1) {
      findings.push({
        body: "仕事がきつかった日は、コンビニや簡単な食事に頼ることが多いようです。",
        insight: "限られた時間とエネルギーの中で、できる選択をしてきた証なのかもしれません。"
      });
    }
  }

  // エネルギーの傾向（全体サマリ）
  const avgEnergy = dates.reduce((s,d)=>s+byDate[d].energy,0)/N;
  if (avgEnergy <= 1.5) {
    findings.push({
      body: `${periodLabel}、全体的にエネルギーが低めの日が多かったようです。`,
      insight: "しんどい日が続いていても、記録をつけ続けていること自体がすごいことだよ。自分のことを知ろうとしている、その積み重ねが大切なんだと思う。"
    });
  } else if (avgEnergy >= 3) {
    findings.push({
      body: `${periodLabel}、全体的に元気な日が多かったようです。`,
      insight: "調子の良い時期がどんな食事・生活と重なっているか、振り返ってみると面白いかもしれません。"
    });
  } else {
    findings.push({
      body: `${periodLabel}、元気な日もしんどい日も、両方がありました。`,
      insight: "波があるのは自然なことです。どんな日でも記録できていることが、「自分を知る」第一歩になっています。"
    });
  }

  // 子どもとの日々
  const childDays = dates.filter(d => byDate[d].checks.child).length;
  if (childDays >= 1) {
    findings.push({
      body: `子どものことで消耗した日が${childDays}日ありました。`,
      insight: "消耗した、と感じることは、それだけ一生懸命だったということ。その日の食事がどうだったか、振り返ってみると自分のパターンが見えてくるかもしれません。"
    });
  }

  // 記録している食事数
  const recordedMealDays = dates.filter(d => meals[d] && Object.values(meals[d]).some(v=>v&&v.trim())).length;
  if (recordedMealDays >= 2) {
    findings.push({
      body: `${recordedMealDays}日分の食事を記録できました。`,
      insight: "食事を記録するって、思っている以上にエネルギーが要ること。それを続けていること自体、自分を大切にしようとしている証だと思うよ。"
    });
  }

  return { ready:true, have:N, findings: findings.slice(0,10), dateFrom:dates[0], dateTo:dates[dates.length-1] };
}


// editingId: 編集対象のエントリID（null=新規）
let S = { view: loadName() ? "home" : "setup", entries:load(), selected:null, energy:2, checks:{}, memo:"", saved:false, confirming:false, editingId:null, wateredDate:loadWaterDate(), watering:false, waterMessage:loadWaterMessage(), showWaterMessage:false, meals:loadMeals(), mealDate:todayJST(), mealDraft:{}, mealSaved:false, printFrom:null, printTo:null, nameInput:"" };

function set(patch) { Object.assign(S,patch); render(); }

function submitName() {
  const n = (S.nameInput||"").trim();
  if (!n) return;
  saveName(n);
  set({ view:"home", nameInput:"" });
}

// --- 食事記録 ---
function openMealView() {
  const date = todayJST();
  const existing = S.meals[date] || {};
  const weekAgo = new Date(date+"T00:00:00+09:00");
  weekAgo.setDate(weekAgo.getDate()-6);
  const weekAgoStr = weekAgo.toLocaleDateString("sv-SE",{timeZone:"Asia/Tokyo"});
  set({ view:"meal", mealDate:date, mealDraft:{...existing}, mealSaved:false, printFrom:weekAgoStr, printTo:date });
}

function changeMealDate(deltaDays) {
  const base = new Date(S.mealDate+"T00:00:00+09:00");
  base.setDate(base.getDate()+deltaDays);
  let newDate = base.toLocaleDateString("sv-SE",{timeZone:"Asia/Tokyo"});
  const today = todayJST();
  if (newDate > today) newDate = today;
  const existing = S.meals[newDate] || {};
  set({ mealDate:newDate, mealDraft:{...existing}, mealSaved:false });
}

function updateMealDraft(slotId, value) {
  S.mealDraft = { ...S.mealDraft, [slotId]: value };
}

function saveMealEntry() {
  const cleaned = {};
  Object.keys(S.mealDraft).forEach(k => {
    const v = (S.mealDraft[k]||"").trim();
    if (v) cleaned[k] = v;
  });
  const nextMeals = { ...S.meals };
  if (Object.keys(cleaned).length === 0) {
    delete nextMeals[S.mealDate];
  } else {
    nextMeals[S.mealDate] = cleaned;
  }
  saveMeals(nextMeals);
  set({ meals:nextMeals, mealSaved:true });
  setTimeout(()=>set({ mealSaved:false }), 1200);
}

function printMeals() {
  const from = S.printFrom, to = S.printTo;
  if (!from || !to || from > to) { alert("開始日と終了日を確認してね"); return; }
  // 範囲内の日付を列挙
  const dates = [];
  let cur = new Date(from+"T00:00:00+09:00");
  const end = new Date(to+"T00:00:00+09:00");
  while (cur <= end) {
    dates.push(cur.toLocaleDateString("sv-SE",{timeZone:"Asia/Tokyo"}));
    cur.setDate(cur.getDate()+1);
  }
  const rows = dates.map(d => {
    const m = S.meals[d] || {};
    const cells = MEAL_SLOTS.map(slot => `<td>${(m[slot.id]||"").replace(/\n/g,"<br>")||"<span class='pm-empty'>―</span>"}</td>`).join("");
    return `<tr><td class="pm-date">${fmtDate(d)}</td>${cells}</tr>`;
  }).join("");
  const headCells = MEAL_SLOTS.map(s=>`<th>${s.emoji} ${s.label}</th>`).join("");
  const printHtml = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
    <title>食事記録 ${fmtDate(from)} 〜 ${fmtDate(to)}</title>
    <style>
      body { font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; color:#3d2b1f; padding:24px; margin:0; }
      h1 { font-size:18px; margin-bottom:4px; }
      .pm-sub { font-size:11px; color:#a08878; margin-bottom:18px; }
      table { width:100%; border-collapse:collapse; font-size:11px; }
      th, td { border:1px solid #ddd; padding:7px 8px; text-align:left; vertical-align:top; }
      th { background:#f3f0ff; font-weight:700; }
      .pm-date { white-space:nowrap; font-weight:700; background:#fdf6ee; }
      .pm-empty { color:#ccc; }
    </style></head>
    <body>
      <h1>🍙 ${getAppTitle()} 食事記録</h1>
      <div class="pm-sub">${fmtDate(from)} 〜 ${fmtDate(to)}</div>
      <table><thead><tr><th>日付</th>${headCells}</tr></thead><tbody>${rows}</tbody></table>
    </body></html>`;

  // iOS Safari はポップアップウィンドウの印刷ダイアログ起動がブロックされやすいため、
  // 非表示iframeに描画して同一ページから印刷を呼び出す
  let frame = document.getElementById("print-frame");
  if (frame) frame.remove();
  frame = document.createElement("iframe");
  frame.id = "print-frame";
  frame.style.position = "fixed";
  frame.style.right = "0"; frame.style.bottom = "0";
  frame.style.width = "0"; frame.style.height = "0";
  frame.style.border = "0";
  document.body.appendChild(frame);
  const doc = frame.contentWindow.document;
  doc.open();
  doc.write(printHtml);
  doc.close();
  setTimeout(() => {
    frame.contentWindow.focus();
    frame.contentWindow.print();
  }, 250);
}

function generateGardenMessage(todayEntry) {
  if (!todayEntry) {
    const noRecordMsgs = [
      "まだ今日の記録はないけど、水だけはちゃんと届いたよ🌱\n気が向いたら今日のことも書いてね。",
      "水ありがとう💧\n記録はいつでも待ってるよ。焦らなくていいよ。",
      "今日はどんな日だった？\n気が向いたら、ちょっとだけ教えてね🌿",
    ];
    return noRecordMsgs[Math.floor(Math.random()*noRecordMsgs.length)];
  }

  const memo = todayEntry.memo || "";
  const energy = todayEntry.energy;
  const checks = todayEntry.checks || {};

  // memoキーワードで返事を生成（優先順位順に判定）
  const has = (words) => words.some(w => memo.includes(w));

  // 疲れ+回復系（銭湯・お風呂・散歩で回復）
  if (has(["銭湯","温泉","お風呂"]) && has(["疲れ","しんど","きつ","つら"])) {
    return "忙しい一日だったんだね🌱\nでも最後に自分を休ませる時間も作れたんだね。\n今日のお水ありがとう。";
  }
  // 達成系（完了形のみ）
  if (has(["売れた","出品できた","出品した","作業できた","作業した","進んだ","終わった","終えた","達成した","発送できた","発送した","梱包できた","梱包した"])) {
    return "作業が進んだ日だったんだね🌸\n小さくても前に進んだこと、庭にもちゃんと届いてるよ。";
  }
  // 子ども成長・嬉しい系
  if (has(["できるようになった","成長","感動","かわいい","癒された"]) && has(["子ども","こども","息子","娘"])) {
    return "子どもとの嬉しい瞬間があったんだね🌿\nそういう気持ち、庭にもおすそ分けしてくれてありがとう。";
  }
  // 子どもで消耗
  if ((has(["子ども","こども","息子","娘"]) && has(["疲れ","しんど","消耗","きつ"])) || checks.child) {
    return "たくさん向き合った一日だったんだね🌿\nできたことが見えにくい日も、ちゃんと過ごした時間は残っているよ。";
  }
  // 眠れなかった
  if (has(["眠れなかった","寝れなかった","寝つけない","寝付けない","夜中起きた","早朝覚醒","眠れない"])) {
    return "長い夜だったんだね🌙\nそんな日でもここに来てくれてありがとう。\n今日は少しでも休める時間がありますように🌱";
  }
  // 寝すぎ（中立に）
  if (has(["寝すぎた","寝過ぎた","寝すぎ","昼まで寝た","過眠"])) {
    return "身体が休む時間を必要としていたのかもしれないね🌱\nゆっくり過ごした日も、庭はちゃんと育ってるよ。";
  }
  // 眠い・睡眠不足
  if (has(["眠い","ねむい","眠たい","寝不足","睡眠不足"])) {
    return "眠い一日だったんだね🌙\nそんな中でも記録しに来てくれてありがとう。\nゆっくり休んでね。";
  }
  // スマホ・だらだら（中立に）
  if (has(["スマホ見すぎた","スマホやりすぎた","ゲームしすぎた","動画見すぎた","だらだら","ゴロゴロ"])) {
    return "気づいたら時間が溶けてた日だったんだね📱\nそんな日もあるよ。今日のお水ありがとう🌱";
  }
  // 楽しい・嬉しい
  if (has(["楽しかった","嬉しかった","最高","幸せ","気分いい","いい感じ"])) {
    return "楽しい気持ちのおすそ分けありがとう🌸\n今日は庭も明るくなった気がするよ。";
  }
  // 忙しい
  if (has(["忙しい","バタバタ","時間ない","余裕ない"])) {
    return "バタバタした一日だったんだね🌿\nそんな中でも水やりに来てくれてありがとう。\n少しでもゆっくりできる時間があるといいな。";
  }
  // 趣味・映画・ゲーム（ポジティブに）
  if (has(["映画","ゲーム","漫画","アニメ","音楽","推し"])) {
    return "好きなことを楽しめた日だったんだね🌸\nそういう時間、大切にしてね。";
  }
  // 支援・手続き系
  if (has(["学校","支援","療育","面談","受診","書類","手続き"])) {
    return "見えにくいところで力を使った一日だったんだね🌿\nお疲れさま。庭はここで静かに待ってるよ。";
  }
  // 疲れた（一般）
  if (has(["疲れた","しんどい","しんど","ぐったり","だるい","きつかった","つらかった","限界"])) {
    return "疲れた日も、水やりに来てくれたね🌱\n今日はそれだけで十分だよ。ゆっくり休んでね。";
  }
  // ゆっくりできた
  if (has(["ゆっくり","のんびり","まったり","ほっとした","リラックス"])) {
    return "ゆっくりできた日だったんだね🌿\nそういう日の水は、特別おいしそうに見えるよ。";
  }

  // エネルギーベースのフォールバック
  const energyMsgs = [
    "今日はゆっくりでいいよ🌱\n水、ちゃんと届いたよ。",
    "お疲れ気味の一日だったんだね🌿\n無理しないでね。",

    "いい調子だったんだね🌸\nその元気、庭にも届いてるよ。",
    "最高な一日だったんだね✨\n庭も一緒に喜んでるよ！",
  ];
  return energyMsgs[Math.min(energy, 4)];
}

function waterPlant() {
  const today = todayJST();
  if (S.wateredDate === today) return;
  saveWaterDate(today);
  const todayEntry = S.entries.find(e=>e.date===today);
  const msg = generateGardenMessage(todayEntry);
  saveWaterMessage(msg);
  S.wateredDate = today;
  S.watering = true;
  S.waterMessage = msg;
  S.showWaterMessage = true;
  render();
  setTimeout(() => { S.watering = false; render(); }, 750);
}

function reopenWaterMessage() {
  const today = todayJST();
  const todayEntry = S.entries.find(e=>e.date===today);
  // 常に最新の記録でメッセージを再生成（⑥編集後の更新対応）
  if (!S.waterMessage || !S.wateredDate || S.wateredDate !== today) {
    const msg = generateGardenMessage(todayEntry);
    saveWaterMessage(msg);
    S.waterMessage = msg;
  }
  S.showWaterMessage = true;
  render();
}

// 記録編集保存後に庭メッセージを更新（⑥対応）
function refreshGardenMessageIfToday(updatedEntry) {
  const today = todayJST();
  if (!updatedEntry || updatedEntry.date !== today) return;
  if (S.wateredDate !== today) return; // 水やりしてない日は更新不要
  const msg = generateGardenMessage(updatedEntry);
  saveWaterMessage(msg);
  S.waterMessage = msg;
}

// 既存エントリを編集モードで write 画面へ
function openEdit(entry) {
  set({
    view: "write",
    energy: entry.energy,
    checks: { ...entry.checks },
    memo: entry.memo || "",
    saved: false,
    editingId: entry.id,
  });
}

      html = header("🔍 記録から見えたこと","home") +
        `<div class="page">
          <div class="ai-intro-card">
            <div class="ai-intro-emoji">🔍</div>
            <div class="ai-intro-title">これは健康診断ではありません</div>
            <div class="ai-intro-text">
              ${fmtDate(analysis.dateFrom)} 〜 ${fmtDate(analysis.dateTo)}の<br>
              ${analysis.have}日分の記録から、<br>
              あなたの心と食事のあいだにある<br>
              小さなリズムを見つけてみました。<br><br>
              良い悪いではなく、<br>
              「自分ってこうなんだ」を<br>
              見つけるための時間にしてね。
            </div>
          </div>
          ${cards}
          <div class="ai-footer-note">
            🌙 記録が増えるほど、新しい気づきが見つかるかもしれません。<br>
            また今度、のぞきにきてね。
          </div>
        </div>`;
    }
  }

  if (view === "garden") {
    if (entries.length === 0) {
      html = header("🌱 庭","home") +
        `<div class="page">
          <div style="text-align:center;color:#a08878;padding:50px 20px;">
            まだ種をまいてないよ。<br>記録をつけると庭が育っていくよ🌱
          </div>
        </div>`;
    } else {
      const g = gardenStats(entries);
      const decorHtml = g.decor.length
        ? g.decor.map(d=>`<span>${d}</span>`).join("")
        : `<span style="font-size:11px;color:#fff;opacity:0.7;">記録を続けると賑やかになるよ</span>`;
      const nextLabel = g.nextStage
        ? `次は「${g.nextStage.emoji} ${g.nextStage.label}」まであと${g.nextStage.min - g.totalDays > 0 ? g.nextStage.min - g.totalDays : 0}日`
        : `最高ランクまで育ったよ🎉`;
      const today = todayJST();
      const alreadyWatered = wateredDate === today;
      const activeWaterMessage = alreadyWatered ? waterMessage : null;
      const waterFx = watering
        ? `<div class="water-drop" style="left:38%;">💧</div>
           <div class="water-drop" style="left:55%;animation-delay:0.08s;">💧</div>
           <div class="water-sparkle" style="left:30%;top:6px;animation-delay:0.25s;">✨</div>
           <div class="water-sparkle" style="left:62%;top:2px;animation-delay:0.35s;">✨</div>`
        : "";
      const waterBtn = alreadyWatered
        ? `<button class="btn-water" disabled>💧 今日はもう水やりしたよ</button>`
        : `<button class="btn-water" onclick="waterPlant()">💧 水をあげる</button>`;
      const reopenBtn = (alreadyWatered && !showWaterMessage)
        ? `<button class="btn-secondary" onclick="reopenWaterMessage()">🌼 今日のメッセージをもう一度見る</button>`
        : "";
      const waterMsgHtml = (activeWaterMessage && showWaterMessage)
        ? `<div class="water-message-card"><span style="font-size:16px;">🌼</span><span style="line-height:1.9;">${activeWaterMessage.replace(/\n/g,"<br>")}</span></div>`
        : "";
      html = header("🌱 庭","home") +
        `<div class="page">
          <div class="garden-sky" style="background:linear-gradient(180deg, ${g.mood.sky[0]}, ${g.mood.sky[1]});">
            <div class="garden-stage-label">${g.stage.label}</div>
            <div class="garden-plant-wrap${watering?" watering":""}">
              <span class="plant-emoji-inner">${g.mood.plantEmoji}</span>
              ${waterFx}
            </div>
            <div class="garden-mood-text">${g.mood.label}</div>
            <div class="garden-decor-row">${decorHtml}</div>
          </div>
          ${waterBtn}
          ${reopenBtn}
          ${waterMsgHtml}
          <div class="card">
            <div class="card-title" style="color:#a08878;">育成の進み具合</div>
            <div class="garden-progress-bar"><div class="garden-progress-fill" style="width:${g.progress}%;background:#8eb8e8;"></div></div>
            <div style="font-size:11px;color:#a08878;margin-top:6px;">${nextLabel}</div>
          </div>
          <div class="garden-stat-row">
            <div class="garden-stat-card"><div class="garden-stat-num">${g.totalDays}</div><div class="garden-stat-lbl">記録した日数</div></div>
            <div class="garden-stat-card"><div class="garden-stat-num">${g.avgEnergy.toFixed(1)}</div><div class="garden-stat-lbl">直近の元気度<br>(0〜4)</div></div>
          </div>
          <div class="card">
            <div class="card-title" style="color:#a08878;">直近のようす（最新7件）</div>
            <div>
              <span class="garden-good-chip">🦋 良い兆候 ${g.goodCount}日</span>
              <span class="garden-tough-chip">🌧️ しんどい兆候 ${g.toughCount}日</span>
            </div>
            <div style="font-size:11px;color:#a08878;margin-top:8px;line-height:1.6;">
              ${(() => {
                const ratio = g.toughCount / Math.max(1, g.goodCount + g.toughCount);
                if (g.goodCount === 0 && g.toughCount === 0) return "まだチェック項目の記録がないよ。次の記録のとき試してみてね。";
                if (ratio >= 0.8) return "しんどい日が多くても、ここまで育てた記録はちゃんと残ってる。庭は消えないよ。";
                if (ratio >= 0.5) return "しんどい日もあったけど、良い日もあったね。波があっていいんだよ。";
                if (g.goodCount >= 5) return "良い兆候が多い時期！そのリズム、大切にしてね🌸";
                if (g.avgEnergy >= 3) return "元気な日が多い時期だね。庭も一緒に喜んでるよ✨";
                if (g.avgEnergy <= 1) return "お疲れ気味の時期だね。庭はここで静かに待ってるよ。";
                return "コツコツ記録できてるね。それが一番大切なことだよ。";
              })()}
            </div>
          </div>
        </div>`;
    }
  }

  if (view === "detail" && selected) {
    const o = ENERGY[selected.energy];
    let checkRows = "";
    let lastCatD = null;
    CHECKS.forEach(c => {
      if (c.cat !== lastCatD) {
        if (lastCatD !== null) checkRows += `<div style="height:8px"></div>`;
        checkRows += `<div style="font-size:11px;font-weight:700;color:#a08878;margin:6px 0 4px;padding-left:2px;">${c.cat}</div>`;
        lastCatD = c.cat;
      }
      const on = !!selected.checks?.[c.id];
      checkRows += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;opacity:${on?1:0.38};">
        <span>${on?"✅":"⬜"}</span><span>${c.label}</span></div>`;
    });
    const memoHtml = selected.memo
      ? `<div class="card"><div class="card-title" style="color:#a08878;">ひとこと</div>
         <div style="font-size:13px;line-height:1.75;white-space:pre-wrap;">${selected.memo}</div></div>` : "";
    const deleteUI = confirming
      ? `<div class="delete-confirm">
          <div style="font-size:13px;font-weight:700;color:#b04030;text-align:center;">
            本当に削除しますか？<br>
            <span style="font-size:11px;font-weight:400;color:#a08878;">元には戻せません</span>
          </div>
          <div class="confirm-btns">
            <button class="btn-cancel" onclick="set({confirming:false})">やっぱりやめる</button>
            <button class="btn-delete" onclick="deleteEntry(${selected.id})">削除する</button>
          </div>
        </div>`
      : `<button class="btn-danger" onclick="set({confirming:true})">この記録を削除する</button>`;
    html = header("記録の詳細","history") +
      `<div class="page">
        <div style="background:${o.color}1a;border:2px solid ${o.color};border-radius:18px;padding:20px 16px;text-align:center;">
          <div style="font-size:11px;color:#a08878;margin-bottom:5px;">${fmtDate(selected.date)}</div>
          <div style="font-size:38px;margin-bottom:3px;">${o.emoji}</div>
          <div style="font-size:17px;font-weight:700;color:${o.color};">${o.label}</div>
        </div>
        <div class="card"><div class="card-title" style="color:#a08878;">その日のチェック</div>${checkRows}</div>
        ${memoHtml}
        <button class="btn-edit" onclick="openEdit(S.selected)">✏️ この記録を編集する</button>
        ${deleteUI}
      </div>`;
  }

  document.getElementById("app").innerHTML = html;
  if (view === "meal") loadMealImages(mealDate);
}

function toggleCheck(id) {
  S.checks = { ...S.checks, [id]: !S.checks[id] };
  render();
}

function saveEntry() {
  const today = todayJST();
  const isEditMode = !!S.editingId;

  let targetDate, targetId;
  if (isEditMode) {
    const editingEntry = S.entries.find(e=>e.id===S.editingId);
    targetDate = editingEntry.date;
    targetId = editingEntry.id;
  } else {
    const existingToday = S.entries.find(e=>e.date===today);
    targetDate = today;
    targetId = existingToday?.id ?? Date.now();
  }

  const entry = { id: targetId, date: targetDate, energy: S.energy, checks: {...S.checks}, memo: S.memo };
  const filtered = S.entries.filter(e=>e.id!==targetId);
  const next = [entry,...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  save(next);
  refreshGardenMessageIfToday(entry); // ⑥ 庭コメントを最新記録で更新
  set({ saved:true, entries:next });

  if (isEditMode) {
    // 編集完了後は detail に戻る
    setTimeout(()=>{
      const updated = next.find(e=>e.id===targetId);
      set({ view:"detail", selected:updated, energy:2, checks:{}, memo:"", saved:false, editingId:null, confirming:false });
    }, 900);
  } else {
    setTimeout(()=>set({ view:"home", energy:2, checks:{}, memo:"", saved:false, editingId:null }), 900);
  }
}

function deleteEntry(id) {
  const next = S.entries.filter(e=>e.id!==id);
  save(next);
  set({ entries:next, view:"history", confirming:false, selected:null });
}

function openDetail(id) {
  const entry = S.entries.find(e=>e.id===id);
  if (entry) set({ selected:entry, view:"detail", confirming:false });
}

render();
</script>
</body>
</html>
