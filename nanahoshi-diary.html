<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ななほし記録帳">
<link rel="apple-touch-icon" href="41AC90DB-003B-486F-A344-5FF4D109E62A.png">
<link rel="icon" href="41AC90DB-003B-486F-A344-5FF4D109E62A.png">
<title>ななほしの記録帳</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #fdf6ee; min-height: 100vh;
    max-width: 430px; margin: 0 auto; color: #3d2b1f;
  }
  .header {
    background: #fff; border-bottom: 2px solid #eeddd0;
    padding: 13px 16px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 20;
  }
  .back-btn {
    background: none; border: none; font-size: 20px;
    cursor: pointer; color: #c8623c; padding: 2px 4px;
  }
  .header-title { font-size: 15px; font-weight: 700; color: #3d2b1f; }
  .header-sub { font-size: 10px; color: #a08878; margin-top: 1px; }
  .page { padding: 16px 16px 40px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #eeddd0; }
  .card-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
  .btn-primary {
    width: 100%; padding: 15px 0; background: #c8623c; color: #fff;
    border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; box-shadow: 0 4px 14px #c8623c38;
  }
  .btn-primary.saved { background: #3aaeaa; }
  .btn-secondary {
    width: 100%; padding: 12px 0; background: #fff; color: #7a5040;
    border: 2px solid #eeddd0; border-radius: 14px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-edit {
    width: 100%; padding: 12px 0; background: #fff7f3; color: #c8623c;
    border: 2px solid #c8623c; border-radius: 14px; font-size: 13px;
    font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .energy-btn {
    flex: 1; padding: 9px 2px; background: #faf6f2;
    border: 2px solid #eeddd0; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-family: inherit;
  }
  .energy-btn.active { background: var(--ec); border-color: var(--eb); }
  .energy-emoji { font-size: 20px; }
  .energy-label { font-size: 8px; color: #a08878; }
  .energy-label.active { font-weight: 700; }
  .energy-selected {
    margin-top: 10px; padding: 9px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 700; text-align: center;
  }
  .check-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 12px; background: #faf6f2;
    border: 2px solid #eeddd0; border-radius: 9px;
    cursor: pointer; text-align: left; font-size: 13px;
    color: #6a5040; font-family: inherit; width: 100%;
  }
  .check-btn.on { background: #fde8dc; border-color: #c8623c; color: #7a2e10; font-weight: 700; }
  textarea {
    width: 100%; border: 1.5px solid #eeddd0; border-radius: 8px;
    padding: 9px 11px; font-size: 13px; color: #3d2b1f;
    background: #fdf6ee; resize: none; font-family: inherit;
    outline: none; line-height: 1.65; box-sizing: border-box;
  }
  .history-btn {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 1.5px solid #eeddd0; border-radius: 14px;
    padding: 12px 14px; cursor: pointer; text-align: left;
    font-family: inherit; width: 100%;
  }
  .history-icon {
    width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 21px;
  }
  .bars { display: flex; gap: 5px; align-items: flex-end; height: 52px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .bar { width: 100%; border-radius: 3px; min-height: 7px; }
  .bar-lbl { font-size: 8px; color: #a08878; }
  .delete-confirm {
    background: #fff5f5; border: 1.5px solid #e8b0a0;
    border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .confirm-btns { display: flex; gap: 8px; }
  .btn-cancel {
    flex: 1; padding: 11px 0; background: #fff; color: #a08878;
    border: 1.5px solid #eeddd0; border-radius: 9px;
    font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .btn-delete {
    flex: 1; padding: 11px 0; background: #b04030; color: #fff;
    border: none; border-radius: 9px; font-size: 13px;
    font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn-danger {
    width: 100%; padding: 12px 0; background: none;
    color: #b04030; border: 1.5px solid #e8b0a0;
    border-radius: 10px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .garden-sky {
    border-radius: 22px; padding: 26px 16px 18px; text-align: center;
    position: relative; overflow: hidden; transition: background 0.6s;
  }
  .garden-stage-label {
    font-size: 11px; color: #fff; opacity: 0.9; margin-bottom: 4px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .garden-plant-wrap {
    font-size: 64px; line-height: 1; margin: 10px 0 6px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
  }
  .garden-mood-text {
    font-size: 13px; font-weight: 700; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .garden-decor-row {
    display: flex; justify-content: center; gap: 6px;
    font-size: 18px; margin-top: 10px; min-height: 22px;
  }
  .garden-progress-bar {
    width: 100%; height: 8px; background: #eeddd0; border-radius: 5px;
    overflow: hidden; margin-top: 6px;
  }
  .garden-progress-fill {
    height: 100%; border-radius: 5px; transition: width 0.5s;
  }
  .garden-stat-row {
    display: flex; gap: 8px;
  }
  .garden-stat-card {
    flex: 1; background: #fff; border: 1px solid #eeddd0; border-radius: 12px;
    padding: 11px 8px; text-align: center;
  }
  .garden-stat-num { font-size: 18px; font-weight: 700; color: #c8623c; }
  .garden-stat-lbl { font-size: 10px; color: #a08878; margin-top: 2px; }
  .garden-good-chip, .garden-tough-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 5px 9px; border-radius: 8px; margin: 2px 3px 2px 0;
  }
  .garden-good-chip { background: #e8f5ea; color: #3a8a4a; }
  .garden-tough-chip { background: #fdeee8; color: #b06030; }
  .garden-plant-wrap { position: relative; }
  .plant-emoji-inner { display: inline-block; }
  .garden-plant-wrap.watering .plant-emoji-inner {
    animation: plantWiggle 0.7s ease-in-out;
  }
  @keyframes plantWiggle {
    0% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(-6deg) scale(1.05); }
    40% { transform: rotate(5deg) scale(1.08); }
    60% { transform: rotate(-3deg) scale(1.05); }
    80% { transform: rotate(2deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .water-drop {
    position: absolute; top: -10px; font-size: 18px;
    animation: dropFall 0.7s ease-in forwards;
    pointer-events: none;
  }
  @keyframes dropFall {
    0% { transform: translateY(0); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translateY(55px); opacity: 0; }
  }
  .water-sparkle {
    position: absolute; font-size: 16px;
    animation: sparklePop 0.8s ease-out forwards;
    pointer-events: none;
  }
  @keyframes sparklePop {
    0% { transform: scale(0) translateY(0); opacity: 0; }
    30% { transform: scale(1.2) translateY(-8px); opacity: 1; }
    100% { transform: scale(0.6) translateY(-26px); opacity: 0; }
  }
  .btn-water {
    width: 100%; padding: 13px 0; background: #3aaeaa; color: #fff;
    border: none; border-radius: 14px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; box-shadow: 0 4px 14px #3aaeaa38;
    transition: opacity 0.3s;
  }
  .btn-water:disabled {
    background: #e0dcd4; color: #a08878; box-shadow: none; cursor: default;
  }
  .water-message-card {
    background: #fff7f0; border: 1.5px solid #ffd9b0; border-radius: 14px;
    padding: 13px 15px; font-size: 13px; line-height: 1.7; color: #7a5040;
    display: flex; gap: 8px; align-items: flex-start;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = "nanahoshi_diary_v2";
const ENERGY = [
  { emoji:"💀", label:"もう限界", color:"#e05252" },
  { emoji:"😩", label:"しんどい",  color:"#e0894a" },
  { emoji:"😐", label:"まあまあ",  color:"#d4b44a" },
  { emoji:"😊", label:"元気",      color:"#5bbf7a" },
  { emoji:"✨", label:"最高！",    color:"#3aaeaa" },
];
const CHECKS = [
  { id:"sleep_ok",    label:"睡眠が取れた",       cat:"😴 睡眠" },
  { id:"sleep_lack",  label:"睡眠不足",           cat:"😴 睡眠" },
  { id:"sleep_nap",   label:"仮眠ぎみ",           cat:"😴 睡眠" },
  { id:"sleep_rhythm",label:"睡眠リズム不調",      cat:"😴 睡眠" },
  { id:"meal",        label:"ちゃんと食べた",      cat:"その他" },
  { id:"alone",       label:"一人の時間があった",   cat:"その他" },
  { id:"child",       label:"子どものことで消耗した",cat:"その他" },
  { id:"work",        label:"仕事がきつかった",     cat:"その他" },
  { id:"task",        label:"やること多すぎた",     cat:"その他" },
];

// エネルギー段階(0〜4)ごとの水やりメッセージ。記録がまだない日は noRecord から選ぶ
const WATER_MESSAGES = {
  0: ["今日はゆっくりでいいよ。水だけはちゃんと届いてるからね。","しんどい日も、水をあげてくれてありがとう。それだけで十分。"],
  1: ["少しお疲れみたいだね。無理しないで、自分のペースでいいよ。","がんばってる証拠だよ、その疲れ。今日はここまでで大丈夫。"],
  2: ["まあまあな1日、悪くないよ。淡々と続けてるの、すごいことだよ。","今日も水をありがとう。コツコツが一番強いんだよ。"],
  3: ["いい調子だね！その元気、庭にもちゃんと届いてるよ。","今日のあなた、なかなかいい感じ。引き続き頼んだよ🌿"],
  4: ["最高の日だね！庭も一緒に喜んでるよ✨","この調子！今日の元気、忘れないようにメモしておこうね。"],
  noRecord: ["まだ今日の記録はないけど、水だけはちゃんと届いたよ。","気が向いたら今日のことも記録してね。焦らなくていいよ。","水ありがとう。記録は後でも、いつでも待ってるよ。"],
};

function todayJST() {
  return new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Tokyo" });
}
function fmtDate(s) {
  return new Date(s+"T00:00:00+09:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
}
function daysSince(s) {
  const base = new Date(s+"T00:00:00+09:00").getTime();
  const now  = new Date(todayJST()+"T00:00:00+09:00").getTime();
  return Math.round((now-base)/86400000);
}
function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch { return []; } }
function save(e) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(e)); } catch {} }

const WATER_KEY = "nanahoshi_diary_water_v1";
const WATER_MSG_KEY = "nanahoshi_diary_water_msg_v1";
function loadWaterDate() { try { return localStorage.getItem(WATER_KEY) || null; } catch { return null; } }
function saveWaterDate(d) { try { localStorage.setItem(WATER_KEY, d); } catch {} }
function loadWaterMessage() { try { return localStorage.getItem(WATER_MSG_KEY) || null; } catch { return null; } }
function saveWaterMessage(m) { try { localStorage.setItem(WATER_MSG_KEY, m); } catch {} }

const GOOD_CHECK_IDS = ["sleep_ok","meal","alone"];
const TOUGH_CHECK_IDS = ["sleep_lack","sleep_nap","sleep_rhythm","child","work","task"];

function gardenStats(entries) {
  const totalDays = entries.length;
  const recent = entries.slice(0,7); // 最新7件（直近の記録）
  const avgEnergy = recent.length
    ? recent.reduce((sum,e)=>sum+e.energy,0) / recent.length
    : 2;
  let goodCount = 0, toughCount = 0;
  recent.forEach(e => {
    GOOD_CHECK_IDS.forEach(id => { if (e.checks?.[id]) goodCount++; });
    TOUGH_CHECK_IDS.forEach(id => { if (e.checks?.[id]) toughCount++; });
  });
  // 育成段階: 記録日数で決まる（責めない・減らない指標）
  const stages = [
    { min:0,  emoji:"🌱", label:"芽が出たばかり" },
    { min:3,  emoji:"🌿", label:"双葉" },
    { min:7,  emoji:"🪴", label:"若木" },
    { min:14, emoji:"🌳", label:"育ってきた木" },
    { min:30, emoji:"🌳", label:"立派な木" },
  ];
  let stageIdx = 0;
  stages.forEach((s,i) => { if (totalDays >= s.min) stageIdx = i; });
  const stage = stages[stageIdx];
  const nextStage = stages[stageIdx+1];
  const progress = nextStage
    ? Math.min(100, Math.round(((totalDays - stage.min) / (nextStage.min - stage.min)) * 100))
    : 100;

  // 雰囲気: 直近のエネルギー平均で決定
  let mood;
  if (avgEnergy <= 0.8) mood = { label:"少ししおれてるね…無理しないでね", sky:["#9b9b9b","#bcb0a8"], plantEmoji:"🥀" };
  else if (avgEnergy <= 1.8) mood = { label:"ちょっとお疲れ気味", sky:["#a9a99a","#c8b89c"], plantEmoji: stage.emoji };
  else if (avgEnergy <= 2.8) mood = { label:"おだやかな日々", sky:["#9fc9d3","#c9e3c4"], plantEmoji: stage.emoji };
  else if (avgEnergy <= 3.8) mood = { label:"気持ちいい風が吹いてるよ", sky:["#7ec8e3","#bfe6b0"], plantEmoji: stage.emoji };
  else mood = { label:"庭が輝いてる✨", sky:["#6fc3e0","#ffe28a"], plantEmoji: stage.emoji };

  // 装飾: グッドチェックが多いほど増える
  let decor = [];
  if (goodCount >= 1) decor.push("🦋");
  if (goodCount >= 3) decor.push("🌸");
  if (goodCount >= 5) decor.push("🐝");
  if (goodCount >= 8) decor.push("🌈");

  return { totalDays, avgEnergy, goodCount, toughCount, stage, nextStage, progress, mood, decor };
}

// editingId: 編集対象のエントリID（null=新規）
let S = { view:"home", entries:load(), selected:null, energy:2, checks:{}, memo:"", saved:false, confirming:false, editingId:null, wateredDate:loadWaterDate(), watering:false, waterMessage:loadWaterMessage(), showWaterMessage:false };

function set(patch) { Object.assign(S,patch); render(); }

function waterPlant() {
  const today = todayJST();
  if (S.wateredDate === today) return;
  saveWaterDate(today);
  const todayEntry = S.entries.find(e=>e.date===today);
  const pool = todayEntry ? WATER_MESSAGES[todayEntry.energy] : WATER_MESSAGES.noRecord;
  const msg = pool[Math.floor(Math.random()*pool.length)];
  saveWaterMessage(msg);
  S.wateredDate = today;
  S.watering = true;
  S.waterMessage = msg;
  S.showWaterMessage = true;
  render();
  setTimeout(() => { S.watering = false; render(); }, 750);
}

function reopenWaterMessage() {
  // 既存メッセージがあればそれを使う。古いバージョンの保存データなどで空の場合は新しく生成する
  if (!S.waterMessage) {
    const today = todayJST();
    const todayEntry = S.entries.find(e=>e.date===today);
    const pool = todayEntry ? WATER_MESSAGES[todayEntry.energy] : WATER_MESSAGES.noRecord;
    const msg = pool[Math.floor(Math.random()*pool.length)];
    saveWaterMessage(msg);
    S.waterMessage = msg;
  }
  S.showWaterMessage = true;
  render();
}

// 既存エントリを編集モードで write 画面へ
function openEdit(entry) {
  set({
    view: "write",
    energy: entry.energy,
    checks: { ...entry.checks },
    memo: entry.memo || "",
    saved: false,
    editingId: entry.id,
  });
}

function render() {
  const { view, entries, selected, energy, checks, memo, saved, confirming, editingId, wateredDate, watering, waterMessage, showWaterMessage } = S;
  const last = entries[0] ?? null;
  const eopt = e => ENERGY[e.energy];
  let html = "";

  // HEADER
  const back = (v, extra) => `<button class="back-btn" onclick="${extra||''}set({view:'${v}'})">←</button>`;
  const header = (title, backTo, backExtra) => `
    <div class="header">
      ${backTo ? back(backTo, backExtra) : ""}
      <div>
        <div class="header-title">${title}</div>
        <div class="header-sub">週1チェック & エネルギー日記</div>
      </div>
    </div>`;

  if (view === "home") {
    let banner = "";
    if (last) {
      const o = eopt(last); const d = daysSince(last.date);
      const note = d===0 ? `<div style="font-size:11px;color:#3aaeaa;font-weight:700;">今日も記録済み ✅</div>`
        : d===1 ? `<div style="font-size:11px;color:#a08878;">昨日記録したよ</div>`
        : d<7   ? `<div style="font-size:11px;color:#a08878;">${d}日前に記録したよ</div>`
        : `<div style="font-size:12px;color:#e05252;font-weight:700;">⚠️ ${d}日ぶり！そろそろ書こう</div>`;
      banner = `<div style="background:${o.color}18;border:2px solid ${o.color};border-radius:18px;padding:16px 18px;">
        <div style="font-size:11px;color:#a08878;margin-bottom:6px;">最後の記録</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;">
          <span style="font-size:30px;">${o.emoji}</span>
          <div><div style="font-size:15px;font-weight:700;">${o.label}</div>
          <div style="font-size:11px;color:#a08878;">${fmtDate(last.date)}</div></div>
        </div>${note}</div>`;
    } else {
      banner = `<div style="background:#f5ece4;border:2px solid #eeddd0;border-radius:18px;padding:16px 18px;">
        <div style="font-size:11px;color:#a08878;margin-bottom:6px;">最後の記録</div>
        <div style="font-size:13px;color:#a08878;">まだ記録がないよ。最初の1件を書いてみよう！</div></div>`;
    }
    let chart = "";
    if (entries.length >= 2) {
      const recent = [...entries].slice(0,7).reverse();
      const bars = recent.map(e => {
        const o = eopt(e); const h=(e.energy+1)*9;
        const d=new Date(e.date+"T00:00:00+09:00");
        return `<div class="bar-wrap"><div class="bar" style="height:${h}px;background:${o.color};"></div><div class="bar-lbl">${d.getMonth()+1}/${d.getDate()}</div></div>`;
      }).join("");
      chart = `<div class="card"><div class="card-title" style="color:#a08878;">最近のエネルギー</div><div class="bars">${bars}</div></div>`;
    }
    const histBtn = entries.length > 0
      ? `<button class="btn-secondary" onclick="set({view:'history'})">📖 これまでの記録を見る（${entries.length}件）</button>` : "";
    const gardenBtn = `<button class="btn-secondary" onclick="set({view:'garden'})">🌱 庭を見る</button>`;
    html = header("ななほしの記録帳") +
      `<div class="page">${banner}
        <button class="btn-primary" onclick="set({view:'write',energy:2,checks:{},memo:'',saved:false,editingId:null})">✏️ 今日を記録する</button>
        ${gardenBtn}${histBtn}${chart}</div>`;
  }

  if (view === "write") {
    const today = todayJST();
    // 編集中のエントリの日付を特定
    const editingEntry = editingId ? entries.find(e=>e.id===editingId) : null;
    const targetDate = editingEntry ? editingEntry.date : today;
    const isToday = targetDate === today;
    const isEditMode = !!editingId;

    const o = ENERGY[energy];
    const energyBtns = ENERGY.map((e,i) => {
      const active = i===energy;
      return `<button class="energy-btn${active?" active":""}" style="--ec:${e.color}18;--eb:${e.color}" onclick="set({energy:${i}})">
        <span class="energy-emoji">${e.emoji}</span>
        <span class="energy-label${active?" active":""}" style="${active?`color:${e.color}`:""}">${e.label}</span>
      </button>`;
    }).join("");
    let checkBtns = "";
    let lastCat = null;
    CHECKS.forEach(c => {
      if (c.cat !== lastCat) {
        if (lastCat !== null) checkBtns += "<div style='height:10px'></div>";
        checkBtns += `<div style="font-size:11px;font-weight:700;color:#a08878;margin-bottom:6px;padding-left:2px;">${c.cat}</div>`;
        lastCat = c.cat;
      }
      const on = !!checks[c.id];
      checkBtns += `<button class="check-btn${on?" on":""}" onclick="toggleCheck('${c.id}')">
        <span style="font-size:15px;">${on?"✅":"⬜"}</span>${c.label}</button><div style='height:7px'></div>`;
    });

    // ヘッダー・ボタンラベルの出し分け
    let pageTitle, btnLabel;
    if (isEditMode) {
      pageTitle = `${fmtDate(targetDate)} を編集`;
      btnLabel = saved ? "✅ 更新したよ！" : "この内容で更新する";
    } else {
      const existingToday = entries.find(e=>e.date===today);
      pageTitle = existingToday ? "今日の記録を更新" : "今日の記録";
      btnLabel = saved ? "✅ 記録したよ！" : existingToday ? "更新する" : "この記録を保存する";
    }

    // 編集モードで detail に戻るためのバック処理
    const backAction = isEditMode
      ? `openDetail(${editingId});return;`
      : null;
    const backView = isEditMode ? "detail" : "home";

    html = header(pageTitle, backView, backAction) +
      `<div class="page">
        <div class="card">
          <div class="card-title">今のエネルギーは？</div>
          <div style="display:flex;gap:6px;">${energyBtns}</div>
          <div class="energy-selected" style="background:${o.color}18;color:${o.color};">${o.emoji} ${o.label}</div>
        </div>
        <div class="card">
          <div class="card-title">今日どうだった？（複数OK）</div>
          ${checkBtns}
        </div>
        <div class="card">
          <div class="card-title">ひとこと日記（なくてもOK）</div>
          <textarea rows="3" placeholder="今日感じたこと、気になったこと…なんでも"
            oninput="S.memo=this.value">${memo}</textarea>
        </div>
        <button class="btn-primary${saved?" saved":""}" onclick="saveEntry()" ${saved?"disabled":""}>${btnLabel}</button>
      </div>`;
  }

  if (view === "history") {
    const items = entries.length === 0
      ? `<div style="text-align:center;color:#a08878;padding:40px;">記録がまだないよ</div>`
      : entries.map(e => {
          const o = eopt(e);
          const preview = e.memo ? e.memo.replace(/\s+/g," ").trim().slice(0,22)+(e.memo.length>22?"…":"") : null;
          return `<button class="history-btn" onclick="openDetail(${e.id})">
            <div class="history-icon" style="background:${o.color}28;">${o.emoji}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;">${fmtDate(e.date)}</div>
              <div style="font-size:11px;color:#a08878;margin-top:2px;">${o.label}${preview?` · ${preview}`:""}</div>
            </div>
            <span style="color:#c0a090;font-size:17px;">›</span>
          </button>`;
        }).join("<div style='height:9px'></div>");
    html = header("これまでの記録","home") + `<div class="page">${items}</div>`;
  }

  if (view === "garden") {
    if (entries.length === 0) {
      html = header("🌱 庭","home") +
        `<div class="page">
          <div style="text-align:center;color:#a08878;padding:50px 20px;">
            まだ種をまいてないよ。<br>記録をつけると庭が育っていくよ🌱
          </div>
        </div>`;
    } else {
      const g = gardenStats(entries);
      const decorHtml = g.decor.length
        ? g.decor.map(d=>`<span>${d}</span>`).join("")
        : `<span style="font-size:11px;color:#fff;opacity:0.7;">記録を続けると賑やかになるよ</span>`;
      const nextLabel = g.nextStage
        ? `次は「${g.nextStage.emoji} ${g.nextStage.label}」まであと${g.nextStage.min - g.totalDays > 0 ? g.nextStage.min - g.totalDays : 0}日`
        : `最高ランクまで育ったよ🎉`;
      const today = todayJST();
      const alreadyWatered = wateredDate === today;
      const activeWaterMessage = alreadyWatered ? waterMessage : null;
      const waterFx = watering
        ? `<div class="water-drop" style="left:38%;">💧</div>
           <div class="water-drop" style="left:55%;animation-delay:0.08s;">💧</div>
           <div class="water-sparkle" style="left:30%;top:6px;animation-delay:0.25s;">✨</div>
           <div class="water-sparkle" style="left:62%;top:2px;animation-delay:0.35s;">✨</div>`
        : "";
      const waterBtn = alreadyWatered
        ? `<button class="btn-water" disabled>💧 今日はもう水やりしたよ</button>`
        : `<button class="btn-water" onclick="waterPlant()">💧 水をあげる</button>`;
      const reopenBtn = (alreadyWatered && !showWaterMessage)
        ? `<button class="btn-secondary" onclick="reopenWaterMessage()">🌼 今日のメッセージをもう一度見る</button>`
        : "";
      const waterMsgHtml = (activeWaterMessage && showWaterMessage)
        ? `<div class="water-message-card"><span style="font-size:16px;">🌼</span><span>${activeWaterMessage}</span></div>`
        : "";
      html = header("🌱 庭","home") +
        `<div class="page">
          <div class="garden-sky" style="background:linear-gradient(180deg, ${g.mood.sky[0]}, ${g.mood.sky[1]});">
            <div class="garden-stage-label">${g.stage.label}</div>
            <div class="garden-plant-wrap${watering?" watering":""}">
              <span class="plant-emoji-inner">${g.mood.plantEmoji}</span>
              ${waterFx}
            </div>
            <div class="garden-mood-text">${g.mood.label}</div>
            <div class="garden-decor-row">${decorHtml}</div>
          </div>
          ${waterBtn}
          ${reopenBtn}
          ${waterMsgHtml}
          <div class="card">
            <div class="card-title" style="color:#a08878;">育成の進み具合</div>
            <div class="garden-progress-bar"><div class="garden-progress-fill" style="width:${g.progress}%;background:#c8623c;"></div></div>
            <div style="font-size:11px;color:#a08878;margin-top:6px;">${nextLabel}</div>
          </div>
          <div class="garden-stat-row">
            <div class="garden-stat-card"><div class="garden-stat-num">${g.totalDays}</div><div class="garden-stat-lbl">記録した日数</div></div>
            <div class="garden-stat-card"><div class="garden-stat-num">${g.avgEnergy.toFixed(1)}</div><div class="garden-stat-lbl">直近の元気度<br>(0〜4)</div></div>
          </div>
          <div class="card">
            <div class="card-title" style="color:#a08878;">直近のようす（最新7件）</div>
            <div>
              <span class="garden-good-chip">🦋 良い兆候 ${g.goodCount}回</span>
              <span class="garden-tough-chip">🌧️ しんどい兆候 ${g.toughCount}回</span>
            </div>
            <div style="font-size:11px;color:#a08878;margin-top:8px;line-height:1.6;">
              庭は枯れたり消えたりしないよ。しんどい日が多くても、ここまで育てた記録はちゃんと残ってる。
            </div>
          </div>
        </div>`;
    }
  }

  if (view === "detail" && selected) {
    const o = ENERGY[selected.energy];
    let checkRows = "";
    let lastCatD = null;
    CHECKS.forEach(c => {
      if (c.cat !== lastCatD) {
        if (lastCatD !== null) checkRows += `<div style="height:8px"></div>`;
        checkRows += `<div style="font-size:11px;font-weight:700;color:#a08878;margin:6px 0 4px;padding-left:2px;">${c.cat}</div>`;
        lastCatD = c.cat;
      }
      const on = !!selected.checks?.[c.id];
      checkRows += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;opacity:${on?1:0.38};">
        <span>${on?"✅":"⬜"}</span><span>${c.label}</span></div>`;
    });
    const memoHtml = selected.memo
      ? `<div class="card"><div class="card-title" style="color:#a08878;">ひとこと</div>
         <div style="font-size:13px;line-height:1.75;white-space:pre-wrap;">${selected.memo}</div></div>` : "";
    const deleteUI = confirming
      ? `<div class="delete-confirm">
          <div style="font-size:13px;font-weight:700;color:#b04030;text-align:center;">
            本当に削除しますか？<br>
            <span style="font-size:11px;font-weight:400;color:#a08878;">元には戻せません</span>
          </div>
          <div class="confirm-btns">
            <button class="btn-cancel" onclick="set({confirming:false})">やっぱりやめる</button>
            <button class="btn-delete" onclick="deleteEntry(${selected.id})">削除する</button>
          </div>
        </div>`
      : `<button class="btn-danger" onclick="set({confirming:true})">この記録を削除する</button>`;
    html = header("記録の詳細","history") +
      `<div class="page">
        <div style="background:${o.color}1a;border:2px solid ${o.color};border-radius:18px;padding:20px 16px;text-align:center;">
          <div style="font-size:11px;color:#a08878;margin-bottom:5px;">${fmtDate(selected.date)}</div>
          <div style="font-size:38px;margin-bottom:3px;">${o.emoji}</div>
          <div style="font-size:17px;font-weight:700;color:${o.color};">${o.label}</div>
        </div>
        <div class="card"><div class="card-title" style="color:#a08878;">その日のチェック</div>${checkRows}</div>
        ${memoHtml}
        <button class="btn-edit" onclick="openEdit(S.selected)">✏️ この記録を編集する</button>
        ${deleteUI}
      </div>`;
  }

  document.getElementById("app").innerHTML = html;
}

function toggleCheck(id) {
  S.checks = { ...S.checks, [id]: !S.checks[id] };
  render();
}

function saveEntry() {
  const today = todayJST();
  const isEditMode = !!S.editingId;

  let targetDate, targetId;
  if (isEditMode) {
    const editingEntry = S.entries.find(e=>e.id===S.editingId);
    targetDate = editingEntry.date;
    targetId = editingEntry.id;
  } else {
    const existingToday = S.entries.find(e=>e.date===today);
    targetDate = today;
    targetId = existingToday?.id ?? Date.now();
  }

  const entry = { id: targetId, date: targetDate, energy: S.energy, checks: {...S.checks}, memo: S.memo };
  const filtered = S.entries.filter(e=>e.id!==targetId);
  const next = [entry,...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  save(next);
  set({ saved:true, entries:next });

  if (isEditMode) {
    // 編集完了後は detail に戻る
    setTimeout(()=>{
      const updated = next.find(e=>e.id===targetId);
      set({ view:"detail", selected:updated, energy:2, checks:{}, memo:"", saved:false, editingId:null, confirming:false });
    }, 900);
  } else {
    setTimeout(()=>set({ view:"home", energy:2, checks:{}, memo:"", saved:false, editingId:null }), 900);
  }
}

function deleteEntry(id) {
  const next = S.entries.filter(e=>e.id!==id);
  save(next);
  set({ entries:next, view:"history", confirming:false, selected:null });
}

function openDetail(id) {
  const entry = S.entries.find(e=>e.id===id);
  if (entry) set({ selected:entry, view:"detail", confirming:false });
}

render();
</script>
</body>
</html>
